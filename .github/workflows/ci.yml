name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Extract the version from package.json so the .vsix filename matches
      # the conventional name used by previous releases. Available to later
      # steps as $VERSION (and as the artifact name suffix).
      - name: Read package version
        id: pkg
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      # The extension has no runtime dependencies, so there is nothing to
      # install: the unit tests run on the built-in Node test runner.
      - name: Run unit tests
        run: npm test

      - name: Package the extension
        run: npx --yes @vscode/vsce package --out mkdocs-live-preview-${{ steps.pkg.outputs.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: mkdocs-live-preview-${{ steps.pkg.outputs.version }}.vsix

      # Attach the .vsix to the GitHub release for tag pushes (v*), so users
      # can download a ready-to-install package from the Releases page.
      # The action creates the release if it does not exist yet (so the
      # workflow can run before `gh release create`) and attaches the asset
      # without overwriting any existing release notes.
      - name: Attach VSIX to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mkdocs-live-preview-${{ steps.pkg.outputs.version }}.vsix
          fail_on_unmatched_files: true
